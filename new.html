<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .contact-container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 100px 40px 80px;
        text-align: center;
      }

      .contact-container h1 {
        font-size: 3rem;
        font-weight: 300;
        color: #111;
        margin-bottom: 50px;
        letter-spacing: 1px;
      }

      .contact-content {
        display: flex;
        gap: 50px;
        justify-content: center;
        align-items: flex-start;
        margin-bottom: 50px;
      }

      .contact-form-wrapper {
        flex: 1;
        max-width: 550px;
      }

      .contact-form {
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .contact-form input,
      .contact-form textarea {
        width: 100%;
        padding: 16px 20px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 15px;
        background: #fff;
        transition: all 0.3s ease;
      }

      .contact-form textarea {
        resize: vertical;
        min-height: 140px;
      }

      .contact-form input:focus,
      .contact-form textarea:focus {
        outline: none;
        border-color: #860000;
        box-shadow: 0 0 0 3px rgba(134, 0, 0, 0.08);
      }

      .submit-btn {
        padding: 16px 40px;
        background-color: #860000;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        align-self: flex-start;
      }

      .submit-btn:hover {
        background-color: #660000;
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(134, 0, 0, 0.3);
      }

      .contact-info-card {
        flex: 0 0 300px;
        background: #fff;
        padding: 35px 30px;
        border-radius: 10px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        text-align: left;
      }

      .contact-info-card h2 {
        font-size: 1.4rem;
        color: #111;
        margin-bottom: 25px;
        font-weight: 600;
      }

      .info-item {
        margin-bottom: 22px;
      }

      .info-item strong {
        display: block;
        color: #222;
        font-size: 0.95rem;
        margin-bottom: 6px;
        font-weight: 600;
      }

      .info-item p {
        color: #666;
        font-size: 0.95rem;
        line-height: 1.6;
        margin: 0;
      }

      .social-media {
        display: flex;
        justify-content: center;
        gap: 16px;
        margin-top: 40px;
      }

      .social-link {
        width: 44px;
        height: 44px;
        background-color: #860000;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 700;
        font-size: 13px;
        transition: all 0.3s ease;
      }

      .social-link:hover {
        background-color: #660000;
        transform: translateY(-3px);
      }
    </style>
  </head>
  <body>
    

    <div class="contact-container">
      <h1>Get In Touch</h1>

      <div class="contact-content">
        <div class="contact-form-wrapper">
          <form class="contact-form" action="#" method="POST">
            <input type="text" name="name" placeholder="Name" required />
            <input type="email" name="email" placeholder="Email" required />
            <input type="tel" name="phone" placeholder="Phone" />
            <textarea
              name="message"
              placeholder="Message"
              rows="5"
              required
            ></textarea>
            <button type="submit" class="submit-btn">Send Message</button>
          </form>
        </div>

        <div class="contact-info-card">
          <h2>Contact Information</h2>

          <div class="info-item">
            <strong>Address:</strong>
            <p>123 Design District<br />New York, NY 10001</p>
          </div>

          <div class="info-item">
            <strong>Phone:</strong>
            <p>+1 (212) 555-0199</p>
          </div>

          <div class="info-item">
            <strong>Email:</strong>
            <p>studio@estarchitecture.co</p>
          </div>

          <div class="info-item">
            <strong>Business Hours:</strong>
            <p>Mon–Fri<br />9:00 AM – 6:00 PM</p>
          </div>
        </div>
      </div>

      <div class="social-media">
        <a href="#" class="social-link">in</a>
        <a href="#" class="social-link">ig</a>
        <a href="#" class="social-link">fb</a>
        <a href="#" class="social-link">tw</a>
        <a href="#" class="social-link">pi</a>
      </div>
    </div>
  </body>
</html>
